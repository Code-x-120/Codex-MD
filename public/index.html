<!DOCTYPE html>
<html>
<head>
    <title>Codex-MD | WhatsApp Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e0e0ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
        .bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 50%,rgba(0,245,255,0.06) 0%,transparent 60%);z-index:0;pointer-events:none}
        .container{position:relative;z-index:1;width:100%;max-width:500px;padding:20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
        .header{text-align:center;padding:40px 0 24px}
        .logo{width:72px;height:72px;margin:0 auto 16px;background:linear-gradient(135deg,#00f5ff,#0066ff);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;box-shadow:0 0 40px rgba(0,245,255,0.2)}
        .header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#00f5ff,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header p{color:#8888aa;font-size:14px;margin-top:6px;line-height:1.5}
        .card{width:100%;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:28px}
        .btn{width:100%;padding:14px 20px;border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
        .btn-primary{background:linear-gradient(135deg,#00f5ff,#0066ff);color:#fff;box-shadow:0 4px 20px rgba(0,245,255,0.2)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(0,245,255,0.3)}
        .btn-outline{background:transparent;border:1px solid #2a2a4a;color:#e0e0ff}
        .btn-outline:hover{background:#2a2a4a}
        .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;margin:4px 4px 0 0}
        .badge.online{background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid rgba(0,255,136,0.2)}
        .badge.info{background:rgba(0,245,255,0.1);color:#00f5ff;border:1px solid rgba(0,245,255,0.2)}
        .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
        .stat-box{background:#12121a;border:1px solid #2a2a4a;border-radius:10px;padding:14px;text-align:center}
        .stat-box .num{font-size:20px;font-weight:800;color:#00f5ff}
        .stat-box .lbl{font-size:11px;color:#8888aa;margin-top:4px}
        .icons{display:flex;justify-content:center;gap:14px;margin-top:20px}
        .icons a{display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:#12121a;border:1px solid #2a2a4a;border-radius:10px;transition:.3s;color:#8888aa;font-size:20px;text-decoration:none}
        .icons a:hover{background:#2a2a4a;color:#00f5ff}
        .footer{text-align:center;padding:24px 0;color:#555577;font-size:12px}
        .divider{width:100%;height:1px;background:#2a2a4a;margin:20px 0}
        @media(max-width:600px){.header{padding:30px 0 20px}.header h1{font-size:26px}.card{padding:20px}.stat-grid{gap:8px}.stat-box{padding:10px}}
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="header">
            <div class="logo">CD</div>
            <h1>Codex-MD</h1>
            <p>WhatsApp Multi-Device Bot<br>Connected &amp; Ready</p>
        </div>
        <div class="card">
            <div style="text-align:center">
                <span class="badge online">● Online</span>
                <span class="badge info">v2.0</span>
            </div>
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="num"><span id="uptime">--</span></div>
                    <div class="lbl">Uptime</div>
                </div>
                <div class="stat-box">
                    <div class="num"><span id="statusDot">●</span></div>
                    <div class="lbl">Status</div>
                </div>
            </div>
            <a href="/pair" class="btn btn-primary">⚡ Pair WhatsApp</a>
            <div class="divider"></div>
            <p style="font-size:13px;color:#8888aa;text-align:center;line-height:1.6">
                Click <strong style="color:#00f5ff">"Pair WhatsApp"</strong> to link your number.<br>
                No login required — just enter your number and a pairing code.
            </p>
            <div class="icons">
                <a href="/pair" title="Pair Device">✦</a>
                <a href="/sessions" title="Sessions">☰</a>
            </div>
        </div>
        <div class="footer">© 2026 Codex-MD</div>
    </div>
    <script>
        async function loadUptime(){
            try{
                const r=await fetch('/health');const d=await r.json();
                if(d.uptime){const h=Math.floor(d.uptime/3600),m=Math.floor((d.uptime%3600)/60);
                document.getElementById('uptime').textContent=h+'h '+m+'m'}
            }catch{}
        }
        loadUptime();setInterval(loadUptime,30000)
    </script>
</body>
</html>
